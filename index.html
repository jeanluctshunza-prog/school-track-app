<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchoolTrack Premium — Cinematic Experience</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020617; --card: rgba(255, 255, 255, 0.03); --accent: #00D2FF; --success: #00FF94; --danger: #FF3D71;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: #E2E8F0; font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 50% 50%, rgba(0, 210, 255, 0.07) 0%, transparent 70%); z-index: -1;
    }

    .glass {
      background: var(--card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 40px;
      width: 90%; max-width: 500px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    h1 { font-family: 'Rajdhani'; font-size: 3rem; letter-spacing: 5px; color: #fff; text-transform: uppercase; margin-bottom: 10px; }
    .tagline { font-size: 0.8rem; letter-spacing: 3px; opacity: 0.5; margin-bottom: 40px; }

    /* Sections */
    .section { display: none; animation: fadeIn 0.5s ease forwards; }
    .active { display: block; }

    /* Boutons Menu */
    .menu-btn {
      width: 100%; padding: 25px; margin-bottom: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.02); color: #fff; cursor: pointer; transition: 0.3s; text-align: left;
      display: flex; align-items: center; gap: 20px;
    }
    .menu-btn:hover { background: rgba(0, 210, 255, 0.1); border-color: var(--accent); transform: scale(1.02); }
    .menu-btn i { font-size: 1.5rem; color: var(--accent); }
    .menu-btn div b { display: block; font-size: 1.1rem; }
    .menu-btn div span { font-size: 0.8rem; opacity: 0.6; }

    /* Formulaires */
    .input-box {
      width: 100%; background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1);
      border-radius: 15px; padding: 20px; color: #fff; font-size: 1.5rem; text-align: center; margin-bottom: 20px; outline: none;
    }
    .input-box:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }

    .btn-action {
      width: 100%; padding: 20px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer;
      text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
    }
    .btn-blue { background: var(--accent); color: #000; }
    .btn-white { background: #fff; color: #000; }
    .btn-next { background: var(--success); color: #000; margin-top: 15px; display: none; }

    .back-link { display: block; margin-top: 25px; color: var(--accent); cursor: pointer; font-size: 0.9rem; text-decoration: underline; }

    .result-screen {
      margin-top: 25px; padding: 20px; border-radius: 15px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);
    }
    .success { color: var(--success); border-color: var(--success); }
    .danger { color: var(--danger); border-color: var(--danger); }
    .warning { color: #FFD93D; border-color: #FFD93D; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="glass">
    <h1>SchoolTrack</h1>
    <p class="tagline">Intelligence & Sécurité</p>

    <div id="menu-section" class="section active">
      <div class="menu-btn" onclick="showSection('borne-section')">
        <i>📟</i>
        <div><b>BORNE ÉCOLE</b><span>Portail Surveillant (Entrée)</span></div>
      </div>
      <div class="menu-btn" onclick="showSection('parent-section')">
        <i>👨‍👩‍👦</i>
        <div><b>ESPACE PARENT</b><span>Suivi des élèves en temps réel</span></div>
      </div>
    </div>

    <div id="borne-section" class="section">
      <h2 style="margin-bottom:20px;">BORNE ENTRÉE</h2>
      <input type="text" id="borneInput" class="input-box" placeholder="CODE MATRICULE" maxlength="4">
      <button onclick="submitBorne()" class="btn-action btn-blue" id="btnBorne">Valider</button>
      <div id="borneResult" class="result-screen">En attente...</div>
      <button onclick="resetBorne()" class="btn-action btn-next" id="btnNext">Suivant ➔</button>
      <span class="back-link" onclick="showSection('menu-section')">↩ Retour au menu</span>
    </div>

    <div id="parent-section" class="section">
      <h2 style="margin-bottom:20px;">ESPACE PARENT</h2>
      <input type="text" id="parentInput" class="input-box" placeholder="MATRICULE ÉLÈVE" maxlength="4">
      <button onclick="submitParent()" class="btn-action btn-white">Vérifier</button>
      <div id="parentResult" class="result-screen">Entrez le code de votre enfant</div>
      <span class="back-link" onclick="showSection('menu-section')">↩ Retour au menu</span>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwI0EoIhSe7zE3EYKr43cFxCxho_afhFjWDDFQIFm_ZfTrvwR3scKqyapTTtsz4uVVb/exec";

    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      if(id === 'borne-section') document.getElementById('borneInput').focus();
    }

    async function submitBorne() {
      const input = document.getElementById('borneInput');
      const res = document.getElementById('borneResult');
      const next = document.getElementById('btnNext');
      const val = input.value.trim();
      if(!val) return;
      res.innerHTML = "VÉRIFICATION...";
      try {
        const response = await fetch(`${API_URL}?action=checkIn&code=${val}`);
        const data = await response.json();
        if(data.status === "SUCCESS") {
          res.className = "result-screen success";
          res.innerHTML = `<b>✅ BIENVENUE</b><br>${data.nom} (${data.classe})`;
          next.style.display = "block";
        } else if(data.status === "EXPIRED") {
          res.className = "result-screen warning";
          res.innerHTML = `<b>⚠️ ABO EXSPIRÉ</b><br>${data.nom}`;
        } else {
          res.className = "result-screen danger";
          res.innerHTML = `<b>❌ CODE INCONNU</b>`;
        }
      } catch(e) { res.innerHTML = "ERREUR RÉSEAU"; }
    }

    function resetBorne() {
      document.getElementById('borneInput').value = "";
      document.getElementById('borneResult').className = "result-screen";
      document.getElementById('borneResult').innerHTML = "En attente...";
      document.getElementById('btnNext').style.display = "none";
      document.getElementById('borneInput').focus();
    }

    async function submitParent() {
      const input = document.getElementById('parentInput');
      const res = document.getElementById('parentResult');
      const val = input.value.trim();
      if(!val) return;
      res.innerHTML = "RECHERCHE...";
      try {
        const response = await fetch(`${API_URL}?action=parentSearch&code=${val}`);
        const data = await response.json();
        if(data.status === "FOUND") {
          if(data.result === "PRESENT") {
            res.className = "result-screen success";
            res.innerHTML = `<b>🟢 PRÉSENT</b><br>${data.nom} est arrivé à ${data.heure}`;
          } else if(data.result === "ABSENT") {
            res.className = "result-screen danger";
            res.innerHTML = `<b>🔴 ABSENT</b><br>${data.nom} n'est pas arrivé.`;
          } else {
            res.className = "result-screen warning";
            res.innerHTML = `<b>🟡 EN ROUTE</b><br>${data.nom} pas encore arrivé.`;
          }
        } else { res.className = "result-screen danger"; res.innerHTML = "CODE INCORRECT"; }
      } catch(e) { res.innerHTML = "ERREUR SERVEUR"; }
    }
  </script>
</body>
</html>

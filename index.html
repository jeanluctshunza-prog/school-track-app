<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEK HAIR BEAUTY | Officiel</title>
    <style>
        body { 
            background-image: url('background.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; 
        }
        .overlay { background: rgba(0, 0, 0, 0.75); min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .gold { color: #D4AF37; text-shadow: 2px 2px 4px #000; }
        .product-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .product-card { 
            background: rgba(17, 17, 17, 0.9); border: 2px solid #D4AF37; 
            border-radius: 15px; width: 280px; padding: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .product-card img { width: 100%; border-radius: 10px; height: 250px; object-fit: cover; border: 1px solid #333; }
        select, input, textarea { 
            width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; 
            border: 1px solid #D4AF37; background: #000; color: #fff; font-size: 14px;
        }
        .btn-select { background: #D4AF37; color: #000; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-whatsapp { 
            background: #25D366; color: white; padding: 18px; border: none; 
            border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px;
        }
        .final-card { max-width: 500px; margin: 40px auto; background: rgba(0,0,0,0.9); padding: 25px; border-radius: 20px; border: 2px solid #D4AF37; }
        footer { margin-top: 40px; padding-bottom: 20px; font-size: 0.8em; opacity: 0.6; }
    </style>
</head>
<body>

<div class="overlay">
    <h1 class="gold">NEK HAIR BEAUTY</h1>
    <p>Le Luxe Capillaire & Coiffure</p>

    <div class="product-grid">
        <div class="product-card">
            <img src="photo1.jpg" alt="Mèches 1">
            <h3 class="gold">Mèches Brésiliennes</h3>
            <select id="size1">
                <option value="18 pouces">18 pouces</option>
                <option value="20 pouces">20 pouces</option>
                <option value="22 pouces">22 pouces</option>
            </select>
            <button class="btn-select" onclick="ajouter('Mèches Brésiliennes', 'size1')">Ajouter</button>
        </div>

        <div class="product-card">
            <img src="photo2.jpg" alt="Mèches 2">
            <h3 class="gold">Lace Frontal HD</h3>
            <select id="size2">
                <option value="14 pouces">14 pouces</option>
                <option value="16 pouces">16 pouces</option>
            </select>
            <button class="btn-select" onclick="ajouter('Lace Frontal HD', 'size2')">Ajouter</button>
        </div>
    </div>

    <div class="final-card">
        <h2 class="gold">Ma Commande</h2>
        <textarea id="panier_total" readonly placeholder="Vos articles s'afficheront ici..."></textarea>
        <input type="text" id="nom_cli" placeholder="Votre Nom complet">
        <input type="text" id="adr_cli" placeholder="Adresse (Quartier/Avenue/N°)">
        <button onclick="envoyer()" class="btn-whatsapp">🚀 Envoyer sur WhatsApp</button>
    </div>

    <div style="margin-top: 30px;">
        <p class="gold">Scanner pour partager :</p>
        <img src="qrcode.png" width="130" style="background:white; padding:8px; border-radius:10px;">
    </div>

    <footer>
        © 2026 NEK HAIR BEAUTY - Tous droits réservés
    </footer>
</div>

<script>
    function ajouter(nom, idSize) {
        var s = document.getElementById(idSize).value;
        document.getElementById('panier_total').value += "- " + nom + " (" + s + ")\n";
    }

    function envoyer() {
        var n = document.getElementById('nom_cli').value;
        var a = document.getElementById('adr_cli').value;
        var p = document.getElementById('panier_total').value;
        var num = "243XXXXXXXXX"; // ⚠️ METS LE VRAI NUMÉRO ICI

        if(n=="" || a=="" || p=="") {
            alert("Veuillez remplir votre nom, adresse et choisir vos mèches.");
            return;
        }

        var msg = "Bonjour *NEK HAIR BEAUTY*, voici ma commande :%0A%0A" +
                  "*CLIENT :* " + encodeURIComponent(n) + "%0A" +
                  "*ADRESSE :* " + encodeURIComponent(a) + "%0A" +
                  "*COMMANDE :*%0A" + encodeURIComponent(p);

        window.open("https://wa.me/" + num + "?text=" + msg, '_blank');
    }
</script>

</body>
</html>

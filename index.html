<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEK HAIR BEAUTY | Officiel</title>
    <style>
        /* Configuration de l'image de fond */
        body { 
            background-image: url('background.jpg'); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }

        /* Superposition sombre pour lire le texte */
        .overlay {
            background: rgba(0, 0, 0, 0.6);
            min-height: 100vh;
            padding: 20px;
        }

        .gold { color: #D4AF37; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }

        /* Style de la carte de livraison */
        .card { 
            background: rgba(17, 17, 17, 0.9); 
            border: 2px solid #D4AF37; 
            padding: 25px; 
            border-radius: 20px; 
            max-width: 450px; 
            margin: 30px auto; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
        }
        
        input, textarea { 
            width: 90%; padding: 12px; margin: 10px 0; 
            border: 1px solid #D4AF37; background: rgba(255, 255, 255, 0.1); 
            color: #fff; border-radius: 8px; font-size: 16px;
        }

        .btn-whatsapp { 
            background: #25D366; color: white; padding: 18px 25px; 
            border: none; border-radius: 50px; font-weight: bold; 
            cursor: pointer; font-size: 18px; width: 100%; margin-top: 15px;
            box-shadow: 0px 5px 15px rgba(37, 211, 102, 0.4);
        }

        .gallery img { 
            width: 80%; max-width: 300px; border-radius: 15px; 
            margin: 10px; border: 2px solid #D4AF37; 
        }

        .qr-section img { border: none; background: white; padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>

        <button onclick="validerCommande()" class="btn-whatsapp">

        </button>

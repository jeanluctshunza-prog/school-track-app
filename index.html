<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchoolTrack — Immersive Experience</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050A18;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent: #00D2FF;
      --accent-glow: rgba(0, 210, 255, 0.3);
      --success: #00FF94;
      --danger: #FF3D71;
      --warning: #FFD93D;
      --text: #E2E8F0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(0, 255, 148, 0.05) 0%, transparent 40%);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Effet de particules en arrière-plan (cinématographique) */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.2;
      pointer-events: none;
      z-index: -1;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
      animation: fadeInDown 1s ease-out;
    }

    header h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: 8px;
      text-transform: uppercase;
      background: linear-gradient(to bottom, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 15px var(--accent-glow));
    }

    header p {
      letter-spacing: 3px;
      font-size: 0.9rem;
      opacity: 0.6;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .container {
      display: flex;
      gap: 40px;
      width: 95%;
      max-width: 1200px;
      perspective: 1000px;
    }

    @media (max-width: 900px) {
      .container { flex-direction: column; align-items: center; }
    }

    .card {
      flex: 1;
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 50px 40px;
      position: relative;
      overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s;
    }

    .card:hover {
      transform: translateY(-10px) rotateX(2deg);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(0, 210, 255, 0.1);
      border-color: rgba(0, 210, 255, 0.3);
    }

    .card::after {
      content: "";
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transition: 0.5s;
    }

    .card:hover::after { left: 100%; }

    .card-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      gap: 15px;
      color: #fff;
    }

    .input-box {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 2px solid var(--glass-border);
      border-radius: 15px;
      padding: 20px;
      color: #fff;
      font-size: 1.5rem;
      text-align: center;
      font-weight: 700;
      margin-bottom: 20px;
      outline: none;
      transition: 0.3s;
    }

    .input-box:focus {
      border-color: var(--accent);
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .btn {
      width: 100%;
      padding: 20px;
      border-radius: 15px;
      border: none;
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: 0.3s;
      background: var(--accent);
      color: #000;
    }

    .btn-parent { background: #fff; color: #000; }

    .btn:hover {
      filter: brightness(1.2);
      transform: scale(1.02);
    }

    .display-screen {
      margin-top: 30px;
      min-height: 150px;
      border-radius: 20px;
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      font-size: 1.1rem;
    }

    /* Animations de statut */
    .pulse-success { border-color: var(--success); box-shadow: 0 0 20px rgba(0, 255, 148, 0.2); color: var(--success); }
    .pulse-danger { border-color: var(--danger); box-shadow: 0 0 20px rgba(255, 61, 113, 0.2); color: var(--danger); }
    .pulse-warning { border-color: var(--warning); box-shadow: 0 0 20px rgba(255, 217, 61, 0.2); color: var(--warning); }

    .data-big { font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; text-transform: uppercase; }
    .data-small { font-size: 1rem; opacity: 0.8; font-weight: 400; }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Effet scanline rétro-cinéma */
    .scanline {
      width: 100%; height: 2px;
      background: rgba(0, 210, 255, 0.1);
      position: absolute;
      top: 0; left: 0;
      animation: scan 4s linear infinite;
      z-index: 2;
      pointer-events: none;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }
  </style>
</head>
<body>

  <header>
    <h1>SchoolTrack</h1>
    <p>Premium Attendance Intelligence</p>
  </header>

  <div class="container">
    
    <div class="card">
      <div class="scanline"></div>
      <div class="card-label">📟 ENTRÉE BÂTIMENT</div>
      <form id="borneForm" onsubmit="handleBorne(event)">
        <input type="text" id="borneInput" class="input-box" placeholder="CODE MATRICULE" maxlength="4" autocomplete="off" required>
        <button type="submit" class="btn">Enregistrer</button>
      </form>
      <div id="borneResult" class="display-screen">
        <span style="opacity: 0.4;">SYSTÈME PRÊT...</span>
      </div>
    </div>

    <div class="card">
      <div class="card-label">👨‍👩‍👧 ESPACE PARENTAL</div>
      <form id="parentForm" onsubmit="handleParent(event)">
        <input type="text" id="parentInput" class="input-box" placeholder="MATRICULE ÉLÈVE" maxlength="4" autocomplete="off" required>
        <button type="submit" class="btn btn-parent">Suivi Direct</button>
      </form>
      <div id="parentResult" class="display-screen">
        <span style="opacity: 0.4;">ENTREZ UN CODE POUR VÉRIFIER</span>
      </div>
    </div>

  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwI0EoIhSe7zE3EYKr43cFxCxho_afhFjWDDFQIFm_ZfTrvwR3scKqyapTTtsz4uVVb/exec";

    // Focus automatique
    window.onload = () => document.getElementById('borneInput').focus();

    // --- BORNE SURVEILLANT ---
    async function handleBorne(e) {
      e.preventDefault();
      const input = document.getElementById('borneInput');
      const resDiv = document.getElementById('borneResult');
      const code = input.value.trim();

      resDiv.innerHTML = "VÉRIFICATION...";
      
      try {
        const response = await fetch(`${API_URL}?action=checkIn&code=${code}`);
        const data = await response.json();
        
        resDiv.className = "display-screen"; // Reset

        if(data.status === "SUCCESS") {
          resDiv.classList.add("pulse-success");
          resDiv.innerHTML = `<div class="data-big">✅ ACCÈS VALIDÉ</div><div class="data-small">${data.nom} | ${data.heure}</div>`;
        } else if(data.status === "EXPIRED") {
          resDiv.classList.add("pulse-warning");
          resDiv.innerHTML = `<div class="data-big">⚠️ ABO EXSPIRÉ</div><div class="data-small">${data.nom}</div>`;
        } else {
          resDiv.classList.add("pulse-danger");
          resDiv.innerHTML = `<div class="data-big">❌ INCORRECT</div><div class="data-small">Code non répertorié</div>`;
        }

        // Reset Automatique pour le surveillant (3 sec)
        setTimeout(() => {
          input.value = "";
          resDiv.className = "display-screen";
          resDiv.innerHTML = "SYSTÈME PRÊT...";
          input.focus();
        }, 3000);

      } catch (err) {
        resDiv.innerHTML = "ERREUR RÉSEAU";
      }
    }

    // --- ESPACE PARENT ---
    async function handleParent(e) {
      e.preventDefault();
      const input = document.getElementById('parentInput');
      const resDiv = document.getElementById('parentResult');
      const code = input.value.trim();

      resDiv.innerHTML = "SYNCHRONISATION...";

      try {
        const response = await fetch(`${API_URL}?action=parentSearch&code=${code}`);
        const data = await response.json();
        
        resDiv.className = "display-screen";

        if(data.status === "FOUND") {
          if(data.result === "PRESENT") {
            resDiv.classList.add("pulse-success");
            resDiv.innerHTML = `<div class="data-big">🟢 PRÉSENT</div><div class="data-small">${data.nom} est arrivé à ${data.heure}</div>`;
          } else if(data.result === "ABSENT") {
            resDiv.classList.add("pulse-danger");
            resDiv.innerHTML = `<div class="data-big">🔴 ABSENT</div><div class="data-small">${data.nom} n'est pas arrivé à l'école.</div>`;
          } else {
            resDiv.classList.add("pulse-warning");
            resDiv.innerHTML = `<div class="data-big">🟡 EN ROUTE</div><div class="data-small">Pas encore de signalement enregistré.</div>`;
          }
        } else {
          resDiv.classList.add("pulse-danger");
          resDiv.innerHTML = `<div class="data-big">CODE INVALIDE</div>`;
        }
      } catch (err) {
        resDiv.innerHTML = "ERREUR SERVEUR";
      }
    }

    // --- SÉCURITÉ ANTI-PIRATAGE ---
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      if (e.key === "F12" || (e.ctrlKey && (e.key === 'u' || e.shiftKey && (e.key === 'I' || e.key === 'J')))) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>

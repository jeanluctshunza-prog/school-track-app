<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchoolTrack — Système de Pointage</title>
  <style>
    :root {
      --primary: #0A438A; /* Bleu Institutionnel */
      --primary-light: #1A5FA8;
      --bg-gradient: linear-gradient(135deg, #EBF3FA 0%, #D6E4F0 100%);
      --text-dark: #2B3A4A;
      --success: #2ECC71;
      --danger: #E74C3C;
      --warning: #F39C12;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    header h1 {
      color: var(--primary);
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
    }

    header p {
      color: #627588;
      margin-top: 5px;
      font-size: 1rem;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      width: 100%;
      max-width: 1100px;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: #FFFFFF;
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 10px 25px rgba(10, 67, 138, 0.08);
      border: 1px solid rgba(10, 67, 138, 0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .card-title {
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 25px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-group {
      width: 100%;
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      color: #7A8B9B;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .input-group input {
      width: 100%;
      padding: 15px;
      border: 2px solid #E2E8F0;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--text-dark);
      text-align: center;
      transition: all 0.3s ease;
      background: #F8FAFC;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--primary);
      background: #FFFFFF;
      box-shadow: 0 0 0 4px rgba(10, 67, 138, 0.1);
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #FFFFFF;
      background: var(--primary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--primary-light);
      transform: translateY(-1px);
    }

    .screen-display {
      width: 100%;
      min-height: 120px;
      margin-top: 25px;
      border-radius: 12px;
      background: #F8FAFC;
      border: 1px dashed #CBD5E1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 15px;
      transition: all 0.3s ease;
    }

    /* États dynamiques de réponse */
    .status-success { background: #E8F8F0; border-color: var(--success); color: #1E6B45; }
    .status-danger { background: #FDE8E8; border-color: var(--danger); color: #8A2525; }
    .status-warning { background: #FEF3E6; border-color: var(--warning); color: #8A5000; }

    .status-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 5px; }
    .status-sub { font-size: 0.95rem; font-weight: 500; }
  </style>
</head>
<body>

  <header>
    <h1>SCHOOLTRACK</h1>
    <p>Gestion d'accès scolaire numérique en temps réel</p>
  </header>

  <div class="container">
    
    <div class="card">
      <div class="card-title">📟 BORNE D'ENTRÉE (Surveillant)</div>
      <form id="borneForm" onsubmit="submitBorne(event)" style="width: 100%;">
        <div class="input-group">
          <label for="borneCode">Scanner ou Taper le Matricule</label>
          <input type="text" id="borneCode" placeholder="Ex: 4512" autocomplete="off" required>
        </div>
        <button type="submit">Valider l'entrée</button>
      </form>
      <div class="screen-display" id="borneScreen">
        <span style="color: #94A3B8;">En attente de scan...</span>
      </div>
    </div>

    <div class="card">
      <div class="card-title">👨‍👩‍👦 ESPACE PARENT</div>
      <form id="parentForm" onsubmit="submitParent(event)" style="width: 100%;">
        <div class="input-group">
          <label for="parentCode">Matricule de l'Élève</label>
          <input type="text" id="parentCode" placeholder="Entrez le code à 4 chiffres" autocomplete="off" required>
        </div>
        <button type="submit" style="background: #2B3A4A;">Vérifier la présence</button>
      </form>
      <div class="screen-display" id="parentScreen">
        <span style="color: #94A3B8;">Entrez un matricule pour suivre votre enfant</span>
      </div>
    </div>

  </div>

  <script>
    // 🔗 REMPLACE CETTE URL PAR TON URL APPS SCRIPT MISE À JOUR
    const API_URL = "https://script.google.com/macros/s/AKfycbwI0EoIhSe7zE3EYKr43cFxCxho_afhFjWDDFQIFm_ZfTrvwR3scKqyapTTtsz4uVVb/exec";

    // Auto-focus direct sur la case borne au démarrage
    window.onload = () => { document.getElementById('borneCode').focus(); };

    // --- LOGIQUE DE LA BORNE (SURVEILLANT) ---
    function submitBorne(e) {
      e.preventDefault();
      const codeInput = document.getElementById('borneCode');
      const screen = document.getElementById('borneScreen');
      const code = codeInput.value.trim();

      if(!code) return;
      screen.innerHTML = "<span>Vérification en cours...</span>";

      fetch(`${API_URL}?action=checkIn&code=${code}`)
        .then(res => res.json())
        .then(data => {
          screen.className = "screen-display"; // reset classes
          
          if(data.status === "SUCCESS") {
            screen.classList.add("status-success");
            screen.innerHTML = `<div class="status-title">✅ BIENVENUE</div><div class="status-sub">${data.nom} (${data.classe}) — ${data.heure}</div>`;
          } else if(data.status === "EXPIRED") {
            screen.classList.add("status-warning");
            screen.innerHTML = `<div class="status-title">⚠️ ACCÈS REFUSÉ</div><div class="status-sub">${data.nom} - Abonnement expiré ou inactif.</div>`;
          } else {
            screen.classList.add("status-danger");
            screen.innerHTML = `<div class="status-title">❌ INCONNU</div><div class="status-sub">Matricule introuvable ou invalide.</div>`;
          }
          
          // ⏱️ RESET DE LA BORNE SPÉCIAL SURVEILLANT (Après 3 secondes)
          setTimeout(() => {
            codeInput.value = "";
            screen.className = "screen-display";
            screen.innerHTML = '<span style="color: #94A3B8;">En attente de scan...</span>';
            codeInput.focus(); // Remet le focus directement sans cliquer
          }, 3000);
        })
        .catch(err => {
          screen.className = "screen-display status-danger";
          screen.innerHTML = `<div class="status-title">Erreur réseau</div>`;
        });
    }

    // --- LOGIQUE DE L'ESPACE PARENT ---
    function submitParent(e) {
      e.preventDefault();
      const code = document.getElementById('parentCode').value.trim();
      const screen = document.getElementById('parentScreen');

      if(!code) return;
      screen.innerHTML = "<span>Recherche...</span>";

      fetch(`${API_URL}?action=parentSearch&code=${code}`)
        .then(res => res.json())
        .then(data => {
          screen.className = "screen-display"; // reset classes
          
          if(data.status === "FOUND") {
            if(data.present) {
              screen.classList.add("status-success");
              screen.innerHTML = `<div class="status-title">🟢 PRÉSENT CE MATIN</div><div class="status-sub">${data.nom} (${data.classe}) est arrivé à <b>${data.heure}</b>.</div>`;
            } else {
              screen.classList.add("status-danger");
              screen.innerHTML = `<div class="status-title">🔴 NON SIGNALÉ CE JOUR</div><div class="status-sub">${data.nom} (${data.classe}) n'a pas encore badgé.</div>`;
            }
          } else {
            screen.classList.add("status-danger");
            screen.innerHTML = `<div class="status-title">Code incorrect</div><div class="status-sub">Aucun élève trouvé avec ce matricule.</div>`;
          }
        })
        .catch(err => {
          screen.className = "screen-display status-danger";
          screen.innerHTML = `<div class="status-title">Erreur serveur</div>`;
        });
    }

    // =================================================================
    // 🛡️ SÉCURITÉ : BLOCAGE DES PETITS MALINS (CLIC DROIT & INSPECTER)
    // =================================================================
    document.addEventListener('contextmenu', e => e.preventDefault());
    
    document.addEventListener('keydown', e => {
      if (e.key === "F12" || 
          (e.ctrlKey && e.key === 'u') || 
          (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J'))) {
        e.preventDefault();
        return false;
      }
    });
  </script>
</body>
</html>

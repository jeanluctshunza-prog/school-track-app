<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEK HAIR BEAUTY | Catalogue Officiel</title>
    <style>
        :root { --gold: #D4AF37; --bg: #000; --card: rgba(30, 30, 30, 0.95); }
        body { background: var(--bg) url('background.jpg') no-repeat center center fixed; background-size: cover; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; text-align: center; }
        .overlay { background: rgba(0,0,0,0.8); min-height: 100vh; width: 100%; position: fixed; top: 0; left: 0; z-index: -1; }
        .container { max-width: 600px; margin: auto; }
        .gold { color: var(--gold); }
        .card { background: var(--card); border: 1px solid var(--gold); border-radius: 15px; padding: 20px; margin-bottom: 25px; text-align: left; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; border: 1px solid #444; }
        
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #000; padding: 10px; border-radius: 8px; max-height: 180px; overflow-y: auto; border: 1px solid #222; margin: 10px 0; }
        .color-item { display: flex; align-items: center; font-size: 0.85em; cursor: pointer; }
        .color-item input { margin-right: 8px; accent-color: var(--gold); }

        .qty-box { background: #111; padding: 12px; border-radius: 8px; border: 1px dashed var(--gold); display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .qty-input { width: 60px; background: #222; color: #fff; border: 1px solid var(--gold); text-align: center; padding: 5px; font-weight: bold; }
        
        input[type="text"], select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        .btn { background: var(--gold); color: #000; padding: 18px; border: none; border-radius: 50px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.1em; text-transform: uppercase; }
        
        #step2 { display: none; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <h1 class="gold">NEK HAIR BEAUTY</h1>
        <p>🚚 Livraison Kinshasa (8000 FC) en 1h</p>

        <div id="step1">
            <div class="card">
                <img src="photo1.jpg">
                <b class="gold">French Curly (22") - 8$</b>
                <p style="font-size:0.8em;">Sélectionnez vos couleurs :</p>
                <div class="color-grid">
                    <label class="color-item"><input type="checkbox" name="f_c" value="1B"> 1B</label>
                    <label class="color-item"><input type="checkbox" name="f_c" value="27#"> 27#</label>
                    <label class="color-item"><input type="checkbox" name="f_c" value="30#"> 30#</label>
                    <label class="color-item"><input type="checkbox" name="f_c" value="350#"> 350#</label>
                    <label class="color-item"><input type="checkbox" name="f_c" value="613#"> 613#</label>
                </div>
                <div class="qty-box">Quantité souhaitée : <input type="number" id="q_f" class="qty-input" placeholder="0"></div>
            </div>

            <div class="card">
                <img src="photo3.jpg">
                <b class="gold">Afro Kinky Bulk (100% Humain)</b>
                <select id="a_s">
                    <option value="12 pouces (80$)">12 pouces - 80$</option>
                    <option value="14 pouces (90$)">14 pouces - 90$</option>
                    <option value="16 pouces (100$)">16 pouces - 100$</option>
                    <option value="18 pouces (110$)">18 pouces - 110$</option>
                </select>
                <label style="display:block; margin:10px 0;"><input type="checkbox" id="a_c"> Noir Naturel</label>
                <div class="qty-box">Quantité souhaitée : <input type="number" id="q_a" class="qty-input" placeholder="0"></div>
            </div>

            <button class="btn" onclick="go2()">Continuer vers le panier ➔</button>
        </div>

        <div id="step2">
            <div class="card">
                <h3 class="gold">Finaliser la commande</h3>
                <input type="text" id="n" placeholder="Nom Complet">
                <input type="text" id="t" placeholder="N° WhatsApp">
                <input type="text" id="a" placeholder="Adresse exacte de livraison">
                
                <p>Heure de livraison :</p>
                <select id="h">
                    <option>08h30 - 12h30</option>
                    <option>12h30 - 15h30</option>
                    <option>15h30 - 17h00</option>
                </select>

                <textarea id="m" rows="3" placeholder="Notes (ex: livrer à 9h précise)"></textarea>
                <button class="btn" style="background:#25D366; color:white;" onclick="send()">🚀 Envoyer la sélection</button>
            </div>
        </div>
    </div>

    <script>
        function go2() { document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='block'; window.scrollTo(0,0); }
        function send() {
            let nom=document.getElementById('n').value, adr=document.getElementById('a').value;
            if(!nom || !adr) return alert("Remplissez vos infos !");
            
            let res = "";
            let f=[]; document.querySelectorAll('input[name="f_c"]:checked').forEach(e=>f.push(e.value));
            if(f.length>0 && document.getElementById('q_f').value > 0) 
                res += "*French Curly (x"+document.getElementById('q_f').value+"):* " + f.join(", ") + "%0A";
            
            if(document.getElementById('a_c').checked && document.getElementById('q_a').value > 0)
                res += "*Afro Kinky (x"+document.getElementById('q_a').value+"):* " + document.getElementById('a_s').value + "%0A";

            let txt = "Bonjour *NEK HAIR BEAUTY*, voici ma sélection de panier :%0A%0A" + 
                      "*Client:* " + nom + "%0A*Lieu:* " + adr + "%0A%0A*ARTICLES SELECTIONNÉS :*%0A" + res + 
                      "%0A*Heure souhaitée:* " + document.getElementById('h').value;
            window.open("https://wa.me/243840847260?text="+encodeURIComponent(txt));
        }
    </script>
</body>
</html>

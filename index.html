<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEK HAIR BEAUTY | Catalogue</title>
    <style>
        body { background: #000 url('background.jpg') no-repeat center center fixed; background-size: cover; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .overlay { background: rgba(0,0,0,0.85); min-height: 100vh; width: 100%; position: fixed; top: 0; left: 0; z-index: -1; }
        .gold { color: #D4AF37; }
        .card { background: rgba(25,25,25,0.95); border: 1px solid #D4AF37; border-radius: 12px; padding: 15px; margin-bottom: 20px; text-align: left; }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0; }
        .qty-box { background: #111; padding: 10px; border-radius: 5px; border: 1px dashed #D4AF37; display: flex; justify-content: space-between; align-items: center; }
        input[type="number"] { width: 50px; background: #222; color: #fff; border: 1px solid #D4AF37; text-align: center; font-weight: bold; }
        input[type="text"], select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; }
        .btn { background: #D4AF37; color: #000; padding: 18px; border: none; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        .btn-wa { background: #25D366; color: #fff; margin-top: 10px; }
        #step2 { display: none; }
        .qr { width: 130px; background: #fff; padding: 5px; margin-top: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <img src="logo.png" style="width:110px;">
    <h1 class="gold">NEK HAIR BEAUTY</h1>

    <div id="step1">
        <div class="card">
            <img src="photo1.jpg">
            <b class="gold">French Curly (22") - 8$</b>
            <div class="grid">
                <label><input type="checkbox" name="prod" data-n="French" value="1B"> 1B</label>
                <label><input type="checkbox" name="prod" data-n="French" value="27"> 27</label>
                <label><input type="checkbox" name="prod" data-n="French" value="30"> 30</label>
                <label><input type="checkbox" name="prod" data-n="French" value="350"> 350</label>
            </div>
            <div class="qty-box">Quantité : <input type="number" id="q_french" value="1" min="1"></div>
        </div>

        <div class="card">
            <img src="photo2.jpg">
            <b class="gold">Mèches Lisses (22") - 10$</b>
            <div class="grid">
                <label><input type="checkbox" name="prod" data-n="Lisse" value="1B"> 1B</label>
                <label><input type="checkbox" name="prod" data-n="Lisse" value="BUG"> BUG</label>
            </div>
            <div class="qty-box">Quantité : <input type="number" id="q_lisse" value="1" min="1"></div>
        </div>

        <div class="card">
            <img src="photo3.jpg">
            <b class="gold">Afro Kinky Bulk (Humain)</b>
            <select id="a_size"><option>12 pouces</option><option>14 pouces</option><option>16 pouces</option></select>
            <label style="display:block; margin:10px 0;"><input type="checkbox" id="a_check"> Noir Naturel</label>
            <div class="qty-box">Quantité : <input type="number" id="q_afro" value="1" min="1"></div>
        </div>

        <div class="card">
            <img src="photo4.jpg">
            <b class="gold">Jumbo Hair (24") - 5$</b>
            <div class="grid">
                <label><input type="checkbox" name="prod" data-n="Jumbo" value="C14"> C14</label>
                <label><input type="checkbox" name="prod" data-n="Jumbo" value="B29"> B29</label>
            </div>
            <div class="qty-box">Quantité : <input type="number" id="q_jumbo" value="1" min="1"></div>
        </div>

        <button class="btn" onclick="go2()">SUIVANT : COMMANDER ➔</button>
    </div>

    <div id="step2">
        <div class="card">
            <a href="#" onclick="go1()" style="color:#D4AF37; font-size: 0.9em;">← Retour au choix</a>
            <h2 class="gold">Mes Coordonnées</h2>
            <input type="text" id="nom" placeholder="Nom Complet">
            <input type="text" id="tel" placeholder="N° Téléphone WhatsApp">
            <input type="text" id="adr" placeholder="Adresse (Commune/Quartier/Avenue)">
            <p>Mode de Paiement :</p>
            <select id="pay">
                <option>Cash à la livraison</option>
                <option>M-Pesa (EUNICE NTUMBA - 0838789465)</option>
                <option>Orange Money (EUNICE NTUMBA - 0840847260)</option>
            </select>
            <textarea id="note" placeholder="Note (Heure préférée, etc.)"></textarea>
            <button class="btn btn-wa" onclick="send()">🚀 ENVOYER SUR WHATSAPP</button>
        </div>
    </div>

    <div style="margin: 30px 0;">
        <p class="gold">Partager notre boutique</p>
        <img src="qr_code.png" class="qr">
    </div>

    <script>
        function go2() { document.getElementById('step1').style.display='none'; document.getElementById('step2').style.display='block'; window.scrollTo(0,0); }
        function go1() { document.getElementById('step1').style.display='block'; document.getElementById('step2').style.display='none'; }
        function send() {
            let n=document.getElementById('nom').value, t=document.getElementById('tel').value, a=document.getElementById('adr').value;
            if(!n || !t || !a) return alert("Remplissez vos infos !");
            let items = "";
            let f = []; document.querySelectorAll('input[data-n="French"]:checked').forEach(e=>f.push(e.value));
            if(f.length>0) items += "*French Curly (x"+document.getElementById('q_french').value+"):* "+f.join(", ")+"%0A";
            let l = []; document.querySelectorAll('input[data-n="Lisse"]:checked').forEach(e=>l.push(e.value));
            if(l.length>0) items += "*Mèches Lisses (x"+document.getElementById('q_lisse').value+"):* "+l.join(", ")+"%0A";
            let j = []; document.querySelectorAll('input[data-n="Jumbo"]:checked').forEach(e=>j.push(e.value));
            if(j.length>0) items += "*Jumbo Hair (x"+document.getElementById('q_jumbo').value+"):* "+j.join(", ")+"%0A";
            if(document.getElementById('a_check').checked) items += "*Afro Kinky (x"+document.getElementById('q_afro').value+"):* "+document.getElementById('a_size').value+"%0A";
            let txt = "Bonjour *NEK HAIR BEAUTY*, commande de :%0A" + n + " ("+t+")%0A*Adresse:* "+a+"%0A%0A*Articles:*%0A"+items+"%0A*Paiement:* "+document.getElementById('pay').value;
            window.open("https://wa.me/243840847260?text="+encodeURIComponent(txt));
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SchoolTrack Quantum V13.3</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020617; 
      --card: rgba(15, 23, 42, 0.7); 
      --accent: #00D2FF; 
      --success: #00FF94; 
      --danger: #FF3D71;
      --warning: #FFD93D;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body {
      background: var(--bg); color: #F3F4F6; min-height: 100vh; 
      display: flex; align-items: center; justify-content: center; 
      padding: 20px; position: relative; overflow: hidden;
    }
    
    body::before {
      content: ""; position: fixed; inset: -10%;
      background: radial-gradient(circle at 20% 20%, rgba(0, 210, 255, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 80% 80%, rgba(255, 61, 113, 0.07) 0%, transparent 40%); 
      z-index: -1;
    }

    .glass {
      background: var(--card); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; 
      padding: 40px 25px; width: 100%; max-width: 420px; text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    h1 { font-family: 'Rajdhani'; font-size: 2.5rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 5px; }
    .tagline { font-size: 0.8rem; letter-spacing: 3px; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 35px; }

    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.4s ease-out forwards; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .menu-btn {
      width: 100%; padding: 20px; margin-bottom: 15px; border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.08); background: rgba(255, 255, 255, 0.03);
      color: #fff; cursor: pointer; transition: all 0.2s ease;
      display: flex; align-items: center; gap: 15px; text-align: left;
    }
    .menu-btn:active { background: var(--accent); color: #000; transform: scale(0.96); }
    .menu-btn i { font-size: 1.5rem; font-style: normal; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; }
    .menu-btn b { display: block; font-size: 1.1rem; }
    .menu-btn span { font-size: 0.8rem; opacity: 0.6; }

    .input-box {
      width: 100%; background: #000; border: 2px solid rgba(255,255,255,0.1);
      border-radius: 15px; padding: 18px; color: #fff; font-size: 1.5rem;
      text-align: center; margin-bottom: 20px; outline: none; font-family: 'Rajdhani'; letter-spacing: 5px;
    }
    .input-box:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,210,255,0.3); }

    .btn-action {
      width: 100%; padding: 18px; border-radius: 15px; border: none;
      font-weight: 700; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.2s;
    }
    .btn-blue { background: var(--accent); color: #000; }
    .btn-white { background: #fff; color: #000; }
    .btn-next { background: var(--success); color: #000; margin-top: 15px; display: none; }

    .result-screen {
      margin-top: 20px; padding: 20px; border-radius: 15px; background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.05); font-size: 1rem; line-height: 1.5;
    }
    .success { color: var(--success); border-color: var(--success); background: rgba(0,255,148,0.05); }
    .danger { color: var(--danger); border-color: var(--danger); background: rgba(255,61,113,0.05); }
    .warning { color: var(--warning); border-color: var(--warning); background: rgba(255,217,61,0.05); }

    .back-link { display: block; margin-top: 25px; opacity: 0.5; font-size: 0.8rem; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>

  <div class="glass">
    <h1>SchoolTrack</h1>
    <p class="tagline">Quantum Edition</p>

    <div id="menu-section" class="section active">
      <div class="menu-btn" onclick="goTo('borne-section')">
        <i>📟</i>
        <div><b>BORNE ENTRÉE</b><span>Surveillance portail</span></div>
      </div>
      <div class="menu-btn" onclick="goTo('parent-section')">
        <i>👨‍👩‍👦</i>
        <div><b>ESPACE PARENT</b><span>Suivi de l'abonnement & présence</span></div>
      </div>
    </div>

    <div id="borne-section" class="section">
      <h3 style="margin-bottom:15px; color:var(--accent)">POINTAGE ENTRÉE</h3>
      <input type="text" id="borneInput" class="input-box" placeholder="CODE" maxlength="4">
      <button onclick="validerBorne()" class="btn-action btn-blue">VÉRIFIER LE BADGE</button>
      <div id="borneResult" class="result-screen">Prêt pour le scan...</div>
      <button onclick="resetBorne()" class="btn-action btn-next" id="btnN">SUIVANT ➔</button>
      <p class="back-link" onclick="goTo('menu-section')">RETOUR AU MENU</p>
    </div>

    <div id="parent-section" class="section">
      <h3 style="margin-bottom:15px; color:#fff;">SUIVI PARENT</h3>
      <input type="text" id="parentInput" class="input-box" placeholder="CODE" maxlength="4">
      <button onclick="validerParent()" class="btn-action btn-white">RECHERCHER</button>
      <div id="parentResult" class="result-screen">Entrez le matricule de votre enfant.</div>
      <p class="back-link" onclick="goTo('menu-section')">RETOUR AU MENU</p>
    </div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycby2mFSLapd4VoweeS5SsXN3aT2lB9dWhcuGvLy4G3rBLP7m4gpt_7uaho4TCtAKkMHhyg/exec";

    function goTo(sectionId) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      const target = document.getElementById(sectionId);
      if(target) target.classList.add('active');
    }

    // INTERFACE BORNE (SURVEILLANT)
    async function validerBorne() {
      const code = document.getElementById('borneInput').value;
      const res = document.getElementById('borneResult');
      const btn = document.getElementById('btnN');
      if(!code) return;

      res.className = "result-screen";
      res.innerHTML = "VÉRIFICATION...";
      
      try {
        const response = await fetch(`${API_URL}?action=checkIn&code=${code}`);
        const data = await response.json();

        if(data.status === "SUCCESS") {
          res.className = "result-screen success";
          res.innerHTML = `✅ <b>ACCÈS VALIDE</b><br><br><b>Élève :</b> ${data.nom}<br><b>Classe :</b> ${data.classe}`;
          btn.style.display = "block";
        } else if(data.status === "EXPIRED") {
          res.className = "result-screen warning";
          res.innerHTML = `⚠️ <b>ABONNEMENT EXPIRÉ</b><br><br><b>Élève :</b> ${data.nom}<br><br><span style="color:#FF3D71; font-weight:bold;">👉 BLOQUER L'ÉLÈVE !</span>`;
        } else {
          res.className = "result-screen danger";
          res.innerHTML = "❌ <b>CODE INVALIDE</b><br>Inconnu dans la base.";
        }
      } catch(e) {
        res.className = "result-screen danger";
        res.innerHTML = "⚠️ ERREUR RÉSEAU SYNC";
      }
    }

    function resetBorne() {
      document.getElementById('borneInput').value = "";
      document.getElementById('borneResult').className = "result-screen";
      document.getElementById('borneResult').innerHTML = "Prêt pour le scan...";
      document.getElementById('btnN').style.display = "none";
      document.getElementById('borneInput').focus();
    }

    // INTERFACE PARENT
    async function validerParent() {
      const code = document.getElementById('parentInput').value;
      const res = document.getElementById('parentResult');
      if(!code) return;

      res.className = "result-screen";
      res.innerHTML = "RECHERCHE SERVEUR...";
      
      try {
        // Le parent fait d'abord une recherche classique
        const response = await fetch(`${API_URL}?action=parentSearch&code=${code}`);
        const data = await response.json();

        if(data.status === "FOUND") {
          // 👀 SÉCURITÉ PARENT : On simule aussi le checkIn pour voir si la date est expirée !
          const checkResp = await fetch(`${API_URL}?action=checkIn&code=${code}`);
          const checkData = await checkResp.json();

          if (checkData.status === "EXPIRED") {
            // Si le script backend dit EXPIRED, on affiche le message d'abonnement fini !
            res.className = "result-screen danger";
            res.innerHTML = `🛑 <b>ABONNEMENT FINI</b><br><br><b>Élève :</b> ${data.nom}<br><br>⚠️ <i>Veuillez réactiver l'abonnement auprès de l'école pour voir les présences.</i>`;
          } else {
            // Si l'abonnement est bon, on montre son état de présence normal
            if(data.result === "PRESENT") {
              res.className = "result-screen success";
              res.innerHTML = `🟢 <b>ÉLÈVE PRÉSENT</b><br><br><b>Enfant :</b> ${data.nom}<br><b>Arrivé à :</b> ${data.heure}`;
            } else {
              res.className = "result-screen warning";
              res.innerHTML = `🔴 <b>ÉLÈVE ABSENT</b><br><br><b>Enfant :</b> ${data.nom}<br>Non signalé au portail aujourd'hui.`;
            }
          }
        } else {
          res.className = "result-screen danger";
          res.innerHTML = "❌ <b>MATRICULE INCONNU</b>";
        }
      } catch(e) {
        res.className = "result-screen danger";
        res.innerHTML = "⚠️ ERREUR RÉSEAU";
      }
    }
  </script>
</body>
</html>
